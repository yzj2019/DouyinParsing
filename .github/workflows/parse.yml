name: 抖音文案解析 (Issue Bot)

on:
  issues:
    types: [opened]

jobs:
  parse:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: 启动本地 Douyin 解析 API (Docker)
        env:
          DOUYIN_COOKIE: ${{ secrets.DOUYIN_COOKIE }}
        run: |
          # 使用 host 网络模式（与官方 docker-compose 一致，直接共享宿主机网络）
          docker run -d \
            --name douyin_api \
            --network host \
            evil0ctal/douyin_tiktok_download_api:latest

          # 等待容器初始化，同时观察日志确认监听端口
          sleep 10
          echo "=== 容器启动日志 ==="
          docker logs douyin_api 2>&1 | tail -30
          echo "=== 容器暴露端口 ==="
          docker inspect --format '{{json .Config.ExposedPorts}}' douyin_api

          # 从容器中取出默认 config.yaml
          docker cp douyin_api:/app/crawlers/douyin/web/config.yaml ./config.yaml 2>/dev/null \
            && echo "已取得默认配置文件" \
            || echo "⚠️  未找到 config.yaml，跳过 Cookie 注入"

          # 将 DOUYIN_COOKIE 注入配置（正则替换 Cookie 行，保留文件原有结构和注释）
          if [ -f ./config.yaml ] && [ -n "$DOUYIN_COOKIE" ]; then
            python3 - <<'PYEOF'
          import re, os

          cookie = os.environ.get("DOUYIN_COOKIE", "")
          path = "./config.yaml"

          with open(path, "r", encoding="utf-8") as f:
              content = f.read()

          # 仅替换 Cookie 行的值，保留缩进和其他所有内容
          new_content, n = re.subn(
              r'([ \t]+Cookie:[ \t]).*',
              lambda m: m.group(1) + cookie,
              content
          )

          if n == 0:
              # 原文件没有 Cookie 行，追加到 headers 下
              new_content = re.sub(
                  r'([ \t]+Referer:[ \t].+)',
                  r'\1\n      Cookie: ' + cookie,
                  content
              )
              print("✅ Cookie 行不存在，已追加到 Referer 后")
          else:
              print(f"✅ Cookie 已注入（长度: {len(cookie)} 字符）")

          with open(path, "w", encoding="utf-8") as f:
              f.write(new_content)
          PYEOF
            # 将修改后的配置写回容器并重启
            docker cp ./config.yaml douyin_api:/app/crawlers/douyin/web/config.yaml
            docker restart douyin_api
            sleep 5
          fi

          # 探测 API 实际监听端口（同时尝试 8000 和 80）
          API_PORT=""
          for port in 8000 80; do
            if curl -sf --max-time 3 http://localhost:${port}/docs > /dev/null 2>&1; then
              API_PORT=$port
              echo "✅ API 监听在端口 ${port}"
              break
            fi
          done

          # 若快速检测没命中，继续轮询（最多再等 60 秒）
          if [ -z "$API_PORT" ]; then
            for i in $(seq 1 30); do
              for port in 8000 80; do
                if curl -sf --max-time 3 http://localhost:${port}/docs > /dev/null 2>&1; then
                  API_PORT=$port
                  echo "✅ Douyin API 已就绪 port=${port} (第 ${i} 次检测)"
                  break 2
                fi
              done
              echo "等待 API 就绪... (${i}/30)"
              sleep 2
            done
          fi

          # 健康检查彻底失败时打印日志并终止
          if [ -z "$API_PORT" ]; then
            echo "❌ API 启动超时，容器日志如下："
            docker logs douyin_api 2>&1
            exit 1
          fi

          # 将实际端口写入 GITHUB_ENV，供后续步骤使用
          echo "DOUYIN_API_PORT=${API_PORT}" >> $GITHUB_ENV

      - name: 诊断：测试 Douyin API 端点响应
        run: |
          echo "=== 测试容器 API 端点（最多等 90s）==="
          curl -s --max-time 90 \
            "http://localhost:${{ env.DOUYIN_API_PORT }}/api/hybrid/video_data?url=https://v.douyin.com/JWuzU5gqfdM/&minimal=true" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('code:', d.get('code')); print('keys:', list(d.keys()))" \
            || echo "⚠️ 诊断请求失败或超时"
          echo "=== 容器最新日志 ==="
          docker logs douyin_api 2>&1 | tail -20

      - name: Run parser
        env:
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
          DOUYIN_API_BASE: "http://localhost:${{ env.DOUYIN_API_PORT }}"
          SHARE_TEXT: "${{ github.event.issue.title }} ${{ github.event.issue.body }}"
        run: |
          echo "开始解析..."
          # 运行解析并收集日志，失败也不终止工作流以便回传错误信息
          python main.py "$SHARE_TEXT" > result_log.txt 2>&1 || true
          
          # 构建 Markdown 格式的回复内容
          echo "<details><summary>点击查看运行日志</summary>" > comment_body.md
          echo "" >> comment_body.md
          echo '```text' >> comment_body.md
          cat result_log.txt >> comment_body.md
          echo '```' >> comment_body.md
          echo "</details>" >> comment_body.md
          echo "" >> comment_body.md
          
          if [ -f transcript.txt ]; then
            echo "**✅ 解析成功！**" >> comment_body.md
            echo "" >> comment_body.md

            # 润色后的书面文案（主要内容，展开展示）
            echo "**📝 润色后文案：**" >> comment_body.md
            echo '```text' >> comment_body.md
            cat polished.txt >> comment_body.md
            echo "" >> comment_body.md
            echo '```' >> comment_body.md
            echo "" >> comment_body.md

            # ASR 原始口播文案（折叠展示，供对比）
            echo "<details><summary>🎙️ ASR 原始口播文案（点击展开）</summary>" >> comment_body.md
            echo "" >> comment_body.md
            echo '```text' >> comment_body.md
            cat transcript.txt >> comment_body.md
            echo "" >> comment_body.md
            echo '```' >> comment_body.md
            echo "</details>" >> comment_body.md
          else
            echo "**❌ 解析失败，请展开上方日志查看原因。**" >> comment_body.md
          fi

      - name: Comment on Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} --body-file comment_body.md
