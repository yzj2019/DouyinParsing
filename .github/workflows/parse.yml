name: 抖音文案解析 (Issue Bot)

on:
  issues:
    types: [opened]

jobs:
  parse:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run parser
        env:
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
          SHARE_TEXT: "${{ github.event.issue.title }} ${{ github.event.issue.body }}"
        run: |
          echo "开始解析..."
          # 运行解析并收集输出，失败也不终止工作流以便回传错误信息
          python main.py "$SHARE_TEXT" > result.txt 2>&1 || true
          
          # 将结果拼接为 Markdown，准备作为评论
          echo '```text' > comment_body.md
          cat result.txt >> comment_body.md
          echo '```' >> comment_body.md

      - name: Comment on Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} --body-file comment_body.md
